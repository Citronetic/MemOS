global:
  imagePullSecrets: []
  storageClass: ""

memos:
  replicaCount: 1
  image:
    repository: memos/memos
    tag: "2.0.9"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8000
  
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  
  env:
    TZ: "Asia/Taipei"
    MOS_CUBE_PATH: "/tmp/data_test"
    MEMOS_BASE_PATH: "."
    MOS_ENABLE_DEFAULT_CUBE_CONFIG: "true"
    MOS_ENABLE_REORGANIZE: "false"
    MOS_TEXT_MEM_TYPE: "general_text"
    ASYNC_MODE: "sync"
    MOS_TOP_K: "50"
    # --- Chat LLM (via OpenRouter) ---
    MOS_CHAT_MODEL: "gpt-4o-mini"
    MOS_CHAT_TEMPERATURE: "0.8"
    MOS_MAX_TOKENS: "2048"
    MOS_TOP_P: "0.9"
    MOS_CHAT_MODEL_PROVIDER: "openai"
    OPENAI_API_KEY: "sk-or-xxx"               # OpenRouter API key
    OPENAI_API_BASE: "https://openrouter.ai/api/v1"
    # --- MemReader LLM (via OpenRouter) ---
    MEMRADER_MODEL: "gpt-4o-mini"
    MEMRADER_API_KEY: "sk-or-xxx"             # same OpenRouter key
    MEMRADER_API_BASE: "https://openrouter.ai/api/v1"
    MEMRADER_MAX_TOKENS: "5000"
    # --- Embedding (via OpenRouter) ---
    EMBEDDING_DIMENSION: "1536"
    MOS_EMBEDDER_BACKEND: "universal_api"
    MOS_EMBEDDER_PROVIDER: "openai"
    MOS_EMBEDDER_MODEL: "openai/text-embedding-3-small"
    MOS_EMBEDDER_API_BASE: "https://openrouter.ai/api/v1"
    MOS_EMBEDDER_API_KEY: "sk-or-xxx"         # same OpenRouter key
    # --- Reranker (local cosine — no external service needed) ---
    MOS_RERANKER_BACKEND: "cosine_local"
    MOS_RERANKER_URL: ""
    MOS_RERANKER_MODEL: ""
    MOS_RERANKER_STRATEGY: "single_turn"
    # --- Features ---
    ENABLE_INTERNET: "false"
    ENABLE_PREFERENCE_MEMORY: "true"
    PREFERENCE_ADDER_MODE: "fast"
    MOS_ENABLE_SCHEDULER: "false"
    MOS_SCHEDULER_TOP_K: "10"
    # --- Graph/vector stores (internal K8s services) ---
    NEO4J_BACKEND: "neo4j-community"
    NEO4J_DB_NAME: "neo4j"
    MOS_NEO4J_SHARED_DB: "false"

neo4j:
  enabled: true
  replicaCount: 1
  image:
    repository: neo4j
    tag: "5.26.4"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    httpPort: 7474
    boltPort: 7687
  
  auth:
    enabled: true
    user: neo4j
    password: "memos123456"
    acceptLicense: "yes"
  
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi

qdrant:
  enabled: true
  replicaCount: 1
  image:
    repository: qdrant/qdrant
    tag: "v1.15.3"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    httpPort: 6333
    grpcPort: 6334
  
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 512Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: memos.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

nodeSelector: {}
tolerations: []
affinity: {}
